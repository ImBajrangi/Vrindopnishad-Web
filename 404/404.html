<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="/Vrindopnishad%20Web/class/logo/v-logo-transparent.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrindopnishad</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #040307;
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Minimal home button */
        .home-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 10px 20px;
            font-size: 13px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <a href="/" class="home-btn">← Home</a>

    <script>
        /**
         * ================================================
         * RANDOM DEMO PAGES CONFIGURATION
         * ================================================
         * Add more demo pages here to expand the random selection.
         * Each entry is the relative path to the demo HTML file.
         * 
         * The system will randomly select one demo each time a 404 occurs.
         */
        const DEMO_PAGES = [
            "../../Projects/getMe/GLSL Particle Metamorphosis/index.html",
            // Add more demos below:
            // "../../Projects/getMe/AnotherEffect/index.html",
            // "../../Projects/getMe/ShaderGallery/index.html",
        ];

        // Select random demo
        const randomIndex = Math.floor(Math.random() * DEMO_PAGES.length);
        const selectedDemo = DEMO_PAGES[randomIndex];

        // Create iframe and load the demo directly
        const iframe = document.createElement('iframe');
        iframe.src = selectedDemo;
        iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope";
        document.body.insertBefore(iframe, document.body.firstChild);
    </script>
</body>

</html>
